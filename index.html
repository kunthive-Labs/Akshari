<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#F4F1EA" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#17150F" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="Akshari is a specimen book for the whole of Google Fonts. Browse, compare, and preview type families by feeling, visual character, and real product context, then copy the CSS." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://akshari.kunthive.in/" />
    <title>Akshari - A specimen book for the whole of Google Fonts</title>

    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph / Twitter Card: shown when the link is shared on social apps
         and chat clients. Kept in sync with the <title>/description above. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Akshari" />
    <meta property="og:url" content="https://akshari.kunthive.in/" />
    <meta property="og:title" content="Akshari - A specimen book for the whole of Google Fonts" />
    <meta property="og:description" content="Browse, compare, and preview every Google Fonts family by feeling and visual character, then copy the CSS." />
    <meta property="og:image" content="https://akshari.kunthive.in/brand-mark.png" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Akshari - A specimen book for the whole of Google Fonts" />
    <meta name="twitter:description" content="Browse, compare, and preview every Google Fonts family by feeling and visual character, then copy the CSS." />
    <meta name="twitter:image" content="https://akshari.kunthive.in/brand-mark.png" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Akshari",
        "url": "https://akshari.kunthive.in/",
        "description": "A specimen book for the whole of Google Fonts. Browse, compare, and preview type families by feeling, visual character, and real product context.",
        "applicationCategory": "DesignApplication",
        "operatingSystem": "Any",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }
    </script>

    <!-- Fontscape is a Google Fonts browser, so fonts.googleapis.com is an intrinsic
         runtime dependency. Chrome type per the design tokens: Fraunces (display),
         Inter (UI), Source Serif 4 (editorial voice). Preconnect keeps first paint fast. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,600&family=Inter:wght@400;500;600&family=Source+Serif+4:ital,wght@0,400;0,600;1,400;1,600&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
