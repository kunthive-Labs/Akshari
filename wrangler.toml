# Cloudflare Pages configuration for Akshari.
# The site is fully static: the catalog ships as public/fonts.json +
# public/presets.json and all search/scoring runs in the browser, so there is
# no Functions runtime, no database, and no secrets to configure.
# Dashboard equivalents when connecting the Git repo: Build command
# `npm run build`, Build output directory `dist`.
name = "akshari"
compatibility_date = "2024-11-06"
pages_build_output_dir = "dist"
